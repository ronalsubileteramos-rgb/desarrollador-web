    <link rel="stylesheet" href="../style.css">

    <style>
        /* ------- ESTILOS EXCLUSIVOS PARA DETALLES ------- */

        body {
            background: linear-gradient(to bottom, #001f2f, #003b5c);
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: #001826;
            border-bottom: 1px solid rgba(0,255,255,0.2);
        }

        .navbar ul li a {
            color: #fff;
            transition: 0.3s;
        }

        .navbar ul li a:hover {
            color: #00eaff;
        }

        .project-detail {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: rgba(0, 40, 60, 0.6);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
            text-align: center;
        }

        .project-detail h2 {
            color: #00eaff;
            margin-bottom: 10px;
        }

        .project-detail h3 {
            margin-top: 30px;
            color: #00d4ff;
        }

        .gallery {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .gallery img {
            width: 260px;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #00eaff;
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 10px;
        }

        ul li {
            padding: 6px;
        }

        .btn {
            display: inline-block;
            background: #00eaff;
            padding: 12px 25px;
            border-radius: 8px;
            color: #003344;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #009ebb;
            box-shadow: 0 0 10px #00eaff;
        }

    </style>
<body>
